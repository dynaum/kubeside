name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Verify modules are tidy
        run: |
          go mod tidy
          # go.sum does not exist until the first dependency lands, so check
          # working-tree status rather than diffing a path that may be absent.
          if [ -n "$(git status --porcelain -- go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy:"
            git status --porcelain -- go.mod go.sum
            git diff -- go.mod go.sum
            exit 1
          fi
      - name: Format
        run: |
          unformatted="$(gofmt -l ./cmd ./internal)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            gofmt -d ./cmd ./internal
            exit 1
          fi

      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -count=1 ./...

  build-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Cross-compile every release target
        run: |
          set -euo pipefail
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" \
              go build -o /dev/null ./cmd/kubeside
            echo "ok $target"
          done
